name = "bottel-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"

[[d1_databases]]
binding = "DB"
database_name = "bottel-db"
database_id = "6c7b56ca-afb3-4bf6-b6a2-3cee5bdca4e2"

# Anti-spam settings (override via Cloudflare dashboard env vars)
[vars]
RATE_LIMIT_PER_MIN = "30"     # max messages per author per channel per minute

[[durable_objects.bindings]]
name = "CHANNEL_ROOM"
class_name = "ChannelRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom"]

[[durable_objects.bindings]]
name = "DIRECT_CHAT_ROOM"
class_name = "DirectChatRoom"

[[migrations]]
tag = "v2"
deleted_classes = ["ChatRoom"]
new_sqlite_classes = ["ChannelRoom"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["DirectChatRoom"]
