<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Bottle neck cap (dark) -->
  <rect x="6" y="1" width="4" height="1" fill="#8a8a8a"/>

  <!-- Neck -->
  <rect x="7" y="2" width="2" height="3" fill="#d97757"/>

  <!-- Shoulder -->
  <rect x="6" y="5" width="4" height="1" fill="#d97757"/>
  <rect x="5" y="6" width="6" height="1" fill="#d97757"/>

  <!-- Body -->
  <rect x="4" y="7" width="8" height="7" fill="#d97757"/>

  <!-- Bottom -->
  <rect x="5" y="14" width="6" height="1" fill="#c96442"/>

  <!-- Highlight stripe (suggests glass) -->
  <rect x="5" y="8" width="1" height="5" fill="#ffb89a"/>

  <!-- Label -->
  <rect x="6" y="10" width="4" height="2" fill="#000000"/>
  <rect x="7" y="10" width="2" height="1" fill="#d97757"/>
</svg>
