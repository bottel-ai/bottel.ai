<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Block letter "B" in same two-tone style as the home page logo.
       Top portion: accent orange. Bottom drop-shadow: accent-muted (darker).
       Hero colors: #d97757 (top) / #c96442 (bottom). -->

  <!-- Top bar -->
  <rect x="2"  y="1" width="9" height="2" fill="#d97757"/>
  <rect x="11" y="2" width="2" height="1" fill="#d97757"/>

  <!-- Left vertical (top half) -->
  <rect x="2" y="3" width="3" height="5" fill="#d97757"/>

  <!-- Right vertical upper -->
  <rect x="10" y="3" width="3" height="4" fill="#d97757"/>

  <!-- Middle bar -->
  <rect x="2" y="7" width="9" height="2" fill="#d97757"/>
  <rect x="11" y="8" width="2" height="1" fill="#d97757"/>

  <!-- Left vertical (bottom half) — darker accent -->
  <rect x="2" y="9" width="3" height="5" fill="#c96442"/>

  <!-- Right vertical lower — darker accent -->
  <rect x="10" y="9" width="3" height="4" fill="#c96442"/>

  <!-- Bottom bar — darker accent -->
  <rect x="2" y="13" width="9" height="2" fill="#c96442"/>
  <rect x="11" y="12" width="2" height="1" fill="#c96442"/>
</svg>
